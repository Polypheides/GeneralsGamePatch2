; Language.ini
; This file contains all declarations that are specific to a language.
; for example, this is where we set the unicode font for a language

Language
  UnicodeFontName = ±¼¸²
  LocalFontFile = PLCC____.TTF  ; When we add our game fonts... this is where we do it.
  CopyrightFont = Courier 12 YES ; Used to display copyright at start of game
  MessageFont   = ±¼¸² 10 YES ; Used for messages at top of screen.
  MilitaryCaptionTitleFont = ±¼¸² 12 YES ; Mission briefing text in bottom left corner.
  MilitaryCaptionFont = ±¼¸² 12 NO ; Mission briefing text in bottom left corner.
  MilitaryCaptionDelayMS = 0
  SuperweaponCountdownNormalFont = ±¼¸² 10 NO  ; superweapon countdown in top right
  SuperweaponCountdownReadyFont = ±¼¸² 10 YES  ; superweapon countdown in top right
  NamedTimerCountdownNormalFont = ±¼¸² 10 NO  ; mission specific timer
  NamedTimerCountdownReadyFont = ±¼¸² 10 NO  ; mission specific timer
  DrawableCaptionFont = ±¼¸² 10 NO ; captions over objects like construction percent.
  DefaultWindowFont = ±¼¸² 14 NO ; default font used by windows that don't specify font.
  DefaultDisplayStringFont = ±¼¸² 12 NO ; default font used for strings that don't specify font.
  TooltipFontName = ±¼¸² 10 NO ; mouse tooltips
  NativeDebugDisplay = FixedSys 8 NO ; used to display frame rate and other debug stats.
  DrawGroupInfoFont = ±¼¸² 10 NO ; used to diplay number of selection group to left of unit health bar.
  CreditsMinorTitleFont = "Arial" 16 YES ; used to diplay number of selection group to left of unit health bar.
  CreditsNormalFont = "Arial" 14 NO ; used to diplay number of selection group to left of unit health bar.
End
